name: CI Liveness (fast)

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-liveness-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - name: Emit context
        shell: bash
        run: |
          set -euo pipefail
          echo "event=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          echo "actor=${{ github.actor }}"

      - name: Summary
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## CI Liveness"
            echo ""
            echo "Este workflow es un *ping* barato (Ubuntu) para verificar que GitHub Actions está disparando eventos."
            echo ""
            echo "- event: \`${{ github.event_name }}\`"
            echo "- ref: \`${{ github.ref }}\`"
            echo "- sha: \`${{ github.sha }}\`"
            echo "- actor: \`${{ github.actor }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
