name: iOS Build (CoreMLProject)

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - name: Xcode version
        run: xcodebuild -version

      - name: List schemes
        run: xcodebuild -list -project CoreMLProject.xcodeproj

      - name: Build (simulator, no codesign)
        run: |
          set -e
          xcodebuild \
            -project CoreMLProject.xcodeproj \
            -scheme CoreMLProject \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Test (simulator, concrete device, no codesign)
        run: |
          set -euo pipefail

          DEST_ID=$(xcodebuild -showdestinations \
            -project CoreMLProject.xcodeproj \
            -scheme CoreMLProject \
            | sed -n 's/.*platform:iOS Simulator, id:\([^,]*\),.*/\1/p' \
            | head -n1)

          if [ -z "${DEST_ID:-}" ]; then
            echo "No iOS Simulator destination found"
            exit 1
          fi

          echo "Using simulator destination id=$DEST_ID"

          xcodebuild \
            -project CoreMLProject.xcodeproj \
            -scheme CoreMLProject \
            -sdk iphonesimulator \
            -destination "id=$DEST_ID" \
            CODE_SIGNING_ALLOWED=NO \
            test
