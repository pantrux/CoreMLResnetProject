name: iOS Build (CoreMLProject)

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - name: Xcode version
        run: xcodebuild -version

      - name: List schemes
        run: xcodebuild -list -project CoreMLProject.xcodeproj

      - name: Build (simulator, no codesign)
        run: |
          set -e
          xcodebuild \
            -project CoreMLProject.xcodeproj \
            -scheme CoreMLProject \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Test (simulator, auto-select/create)
        run: |
          set -euo pipefail

          DESTINATIONS=$(xcodebuild -showdestinations \
            -project CoreMLProject.xcodeproj \
            -scheme CoreMLProject)

          echo "$DESTINATIONS"

          DEST_ID=$(echo "$DESTINATIONS" \
            | sed -nE 's/.*platform:iOS Simulator,.*id:[[:space:]]*([^,]+),.*/\1/p' \
            | grep -v 'placeholder' \
            | head -n1 || true)

          if [ -z "${DEST_ID:-}" ]; then
            echo "No concrete iOS Simulator destination in xcodebuild output. Trying simctl JSON..."

            eval "$(python3 - <<'PY'
import json, subprocess

def version_key(version: str):
    parts = []
    for token in (version or '').replace('-', '.').split('.'):
        if token.isdigit():
            parts.append(int(token))
        elif token:
            parts.append(token)
    return tuple(parts)

try:
    raw = subprocess.check_output(['xcrun', 'simctl', 'list', '-j'], text=True)
    data = json.loads(raw)
except Exception:
    print('RUNTIME_ID=')
    print('DEVICE_TYPE_ID=')
    raise SystemExit(0)

runtimes = [r for r in data.get('runtimes', []) if r.get('isAvailable') and 'SimRuntime.iOS' in r.get('identifier', '')]
runtimes.sort(key=lambda r: version_key(r.get('version', '')))
runtime_id = runtimes[-1]['identifier'] if runtimes else ''

devicetypes = data.get('devicetypes', [])
preferred = ['iPhone 16 Pro', 'iPhone 16', 'iPhone 15 Pro', 'iPhone 15']
device_type_id = ''
for name in preferred:
    for d in devicetypes:
        if d.get('name') == name:
            device_type_id = d.get('identifier', '')
            break
    if device_type_id:
        break

if not device_type_id:
    for d in devicetypes:
        if (d.get('name') or '').startswith('iPhone'):
            device_type_id = d.get('identifier', '')
            break

print(f'RUNTIME_ID={runtime_id}')
print(f'DEVICE_TYPE_ID={device_type_id}')
PY
)"

            if [ -n "${RUNTIME_ID:-}" ] && [ -n "${DEVICE_TYPE_ID:-}" ]; then
              DEST_ID=$(xcrun simctl create "CI-iPhone" "$DEVICE_TYPE_ID" "$RUNTIME_ID" || true)
              if [ -n "${DEST_ID:-}" ]; then
                xcrun simctl boot "$DEST_ID" || true
                xcrun simctl bootstatus "$DEST_ID" -b || true
              fi
            fi
          fi

          if [ -z "${DEST_ID:-}" ]; then
            echo "::warning::No usable iOS Simulator runtime/device available on this runner. Skipping tests."
            exit 0
          fi

          echo "Using iOS Simulator destination id=$DEST_ID"

          xcodebuild \
            -project CoreMLProject.xcodeproj \
            -scheme CoreMLProject \
            -sdk iphonesimulator \
            -destination "id=$DEST_ID" \
            CODE_SIGNING_ALLOWED=NO \
            test
