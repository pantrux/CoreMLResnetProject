name: iOS Build (CoreMLProject)

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - name: Xcode version
        run: xcodebuild -version

      - name: List schemes
        run: xcodebuild -list -project CoreMLProject.xcodeproj

      - name: Build (simulator, no codesign)
        run: |
          set -e
          xcodebuild \
            -project CoreMLProject.xcodeproj \
            -scheme CoreMLProject \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Test (simulator, auto-provisioned if needed, no codesign)
        run: |
          set -euo pipefail

          DESTINATIONS=$(xcodebuild -showdestinations \
            -project CoreMLProject.xcodeproj \
            -scheme CoreMLProject)

          echo "$DESTINATIONS"

          DEST_ID=$(echo "$DESTINATIONS" \
            | sed -nE 's/.*platform:iOS Simulator,.*id:[[:space:]]*([^,]+),.*/\1/p' \
            | grep -v 'placeholder' \
            | head -n1 || true)

          if [ -z "${DEST_ID:-}" ]; then
            echo "No concrete iOS simulator found. Creating one with simctl..."

            RUNTIME_ID=$(xcrun simctl list runtimes \
              | sed -nE 's/^[[:space:]]*iOS .* - (com\.apple\.CoreSimulator\.SimRuntime\.iOS[^ ]+) \(available\)$/\1/p' \
              | tail -n1)

            DEVICE_TYPE_ID=$(xcrun simctl list devicetypes \
              | sed -nE 's/^[[:space:]]*iPhone 16( Pro)? \((com\.apple\.CoreSimulator\.SimDeviceType\.[^)]+)\)$/\2/p' \
              | head -n1)

            if [ -z "${DEVICE_TYPE_ID:-}" ]; then
              DEVICE_TYPE_ID=$(xcrun simctl list devicetypes \
                | sed -nE 's/^[[:space:]]*iPhone .*\((com\.apple\.CoreSimulator\.SimDeviceType\.[^)]+)\)$/\1/p' \
                | head -n1)
            fi

            if [ -z "${RUNTIME_ID:-}" ] || [ -z "${DEVICE_TYPE_ID:-}" ]; then
              echo "Unable to determine runtime/device type for simulator creation"
              exit 1
            fi

            DEST_ID=$(xcrun simctl create "CI-iPhone" "$DEVICE_TYPE_ID" "$RUNTIME_ID")
            xcrun simctl boot "$DEST_ID" || true
            xcrun simctl bootstatus "$DEST_ID" -b
          fi

          echo "Using iOS Simulator destination id=$DEST_ID"

          xcodebuild \
            -project CoreMLProject.xcodeproj \
            -scheme CoreMLProject \
            -sdk iphonesimulator \
            -destination "id=$DEST_ID" \
            CODE_SIGNING_ALLOWED=NO \
            test
