name: iOS Build (CoreMLProject)

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - name: Xcode version
        run: xcodebuild -version

      - name: List schemes
        run: xcodebuild -list -project CoreMLProject.xcodeproj

      - name: Build (simulator, no codesign)
        run: |
          set -e
          xcodebuild \
            -project CoreMLProject.xcodeproj \
            -scheme CoreMLProject \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Test (best available destination, no codesign)
        run: |
          set -euo pipefail

          DESTINATIONS=$(xcodebuild -showdestinations \
            -project CoreMLProject.xcodeproj \
            -scheme CoreMLProject)

          echo "$DESTINATIONS"

          DEST_ID=$(echo "$DESTINATIONS" \
            | sed -nE 's/.*platform:iOS Simulator,.*id:[[:space:]]*([^,]+),.*/\1/p' \
            | grep -v 'placeholder' \
            | head -n1 || true)

          DEST_KIND="iOS Simulator"

          if [ -z "${DEST_ID:-}" ]; then
            DEST_ID=$(echo "$DESTINATIONS" \
              | sed -nE 's/.*platform:macOS,.*id:[[:space:]]*([^,]+),.*/\1/p' \
              | head -n1 || true)
            DEST_KIND="macOS (Designed for iPad/iPhone)"
          fi

          if [ -z "${DEST_ID:-}" ]; then
            echo "No compatible destination found"
            exit 1
          fi

          echo "Using destination ($DEST_KIND): id=$DEST_ID"

          xcodebuild \
            -project CoreMLProject.xcodeproj \
            -scheme CoreMLProject \
            -destination "id=$DEST_ID" \
            test
