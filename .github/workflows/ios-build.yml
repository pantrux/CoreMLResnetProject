name: iOS Build (CoreMLProject)

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - name: Prepare CI diagnostics folder
        run: mkdir -p ci-logs

      - name: Xcode version
        run: xcodebuild -version | tee ci-logs/xcode-version.log

      - name: List schemes
        run: xcodebuild -list -project CoreMLProject.xcodeproj | tee ci-logs/schemes.log

      - name: Detect iOS Simulator destination
        id: detect_destination
        shell: bash
        run: |
          set -euo pipefail

          DESTINATIONS=$(xcodebuild -showdestinations \
            -project CoreMLProject.xcodeproj \
            -scheme CoreMLProject)

          echo "$DESTINATIONS" | tee ci-logs/destinations.log

          DEST_ID=$(echo "$DESTINATIONS" \
            | sed -nE 's/.*platform:iOS Simulator,.*id:[[:space:]]*([^,]+),.*/\1/p' \
            | grep -v 'placeholder' \
            | head -n1 || true)

          if [ -n "${DEST_ID:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "dest_id=$DEST_ID" >> "$GITHUB_OUTPUT"
            {
              echo "## iOS Test Gate"
              echo "✅ Simulator detectado: \`$DEST_ID\`"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            {
              echo "## iOS Test Gate"
              echo "⚠️ No hay simulador iOS concreto en este runner (solo placeholder)."
              echo "Se ejecuta build obligatorio y se omiten tests en este entorno."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build gate (mandatory)
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -project CoreMLProject.xcodeproj \
            -scheme CoreMLProject \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build | tee ci-logs/build.log

      - name: Build-for-testing gate (mandatory)
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -project CoreMLProject.xcodeproj \
            -scheme CoreMLProject \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build-for-testing | tee ci-logs/build-for-testing.log

      - name: Test gate (run when simulator is available)
        if: steps.detect_destination.outputs.available == 'true'
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -project CoreMLProject.xcodeproj \
            -scheme CoreMLProject \
            -sdk iphonesimulator \
            -destination "id=${{ steps.detect_destination.outputs.dest_id }}" \
            -resultBundlePath ci-logs/test-results.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            test | tee ci-logs/test.log

      - name: Test gate (skipped)
        if: steps.detect_destination.outputs.available != 'true'
        run: |
          echo "::warning::No concrete iOS Simulator runtime/device available on this runner. Tests were skipped." | tee ci-logs/test-skipped.log

      - name: Upload CI diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-ci-diagnostics-${{ github.run_id }}
          path: ci-logs
          if-no-files-found: warn
