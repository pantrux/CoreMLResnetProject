name: iOS Build (CoreMLProject)

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - name: Xcode version
        run: xcodebuild -version

      - name: List schemes
        run: xcodebuild -list -project CoreMLProject.xcodeproj

      - name: Build (simulator, no codesign)
        run: |
          set -e
          xcodebuild \
            -project CoreMLProject.xcodeproj \
            -scheme CoreMLProject \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Test (simulator, no codesign)
        run: |
          set -e
          xcodebuild \
            -project CoreMLProject.xcodeproj \
            -scheme CoreMLProject \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            test
